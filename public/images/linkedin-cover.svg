<svg width="1584" height="396" viewBox="0 0 1584 396" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1584" height="396" fill="#162415"/>

  <!-- Ambient glow blobs -->
  <circle cx="1200" cy="200" r="400" fill="#68ef3f" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="300" cy="100" r="300" fill="#68ef3f" opacity="0.04" filter="url(#blur1)"/>
  <circle cx="700" cy="350" r="250" fill="#68ef3f" opacity="0.03" filter="url(#blur1)"/>

  <!-- Logo icon -->
  <rect x="440" y="100" width="72" height="72" rx="14" fill="#68ef3f"/>
  <path d="M458 125C458 125 458 155 476 155C494 155 494 125 494 125" stroke="#162415" stroke-width="6.5" stroke-linecap="round"/>
  <circle cx="476" cy="117" r="4" fill="#162415"/>

  <!-- Wordmark "ply" — icon replaces the "u" -->
  <text x="516" y="153" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#68ef3f" letter-spacing="-0.5">ply</text>

  <!-- Tagline -->
  <text x="440" y="218" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="white" opacity="0.5">Soft skills training in Slack. Free forever.</text>

  <!-- Trust chips -->
  <text x="440" y="270" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#68ef3f" opacity="0.6">uply.work</text>

  <!-- Decorative accent line -->
  <rect x="440" y="236" width="60" height="2" rx="1" fill="#68ef3f" opacity="0.3"/>

  <defs>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>
</svg>
